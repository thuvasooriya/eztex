<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Redirecting to eztex</title>
    <link rel="canonical" href="https://eztex.thuvasooriya.me/">
    <script>
      const target = new URL(window.location.pathname + window.location.search + window.location.hash, "https://eztex.thuvasooriya.me");
      window.location.replace(target.toString());
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="https://eztex.thuvasooriya.me/">eztex</a>.</p>
  </body>
</html>
